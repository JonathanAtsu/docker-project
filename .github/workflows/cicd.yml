name: CI/CD Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: build image
        run: |
            docker buildx build -t my-app:nginx .
            docker tag my-app:nginx my-app:latest
  push-image:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: push to ECR
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: aws credentials OIDC
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: push image to ECR
        run: |
          
          docker push ${{ secrets.ECR_REPO }}/${{ secrets.ECR_REPO }}:latest
           